# Server Settings
server.port=${SERVER_PORT:8088}

# Database Configuration (完美适配 Docker Compose 生产环境)
# 默认本地 SQLite
# NAS 生产环境时，SPRING_DATASOURCE_URL 会被覆盖为 jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:/root/.openclaw/workspace/testplatform.db}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin123}

# 驱动由 URL 自动推断，不强制指定以兼容多库
# spring.datasource.driver-class-name 

# JPA/Hibernate 方言适配
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Settings
jwt.secret=${JWT_SECRET:TestPlatformSecretKey2024SuperLong}
jwt.expiration=${JWT_EXPIRATION:86400000}
